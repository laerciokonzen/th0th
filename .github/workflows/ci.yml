name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run type-check

      - name: Build
        run: bun run build

      - name: Test
        run: bun run test

  mcp:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: api
          push: false
          load: true
          tags: th0th-api:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build MCP image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: mcp
          push: false
          load: true
          tags: th0th-mcp:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start API container
        run: |
          docker run -d --name th0th-api -p 3333:3333 th0th-api:test
          sleep 5

      - name: Health check
        run: |
          STATUS=$(curl -sf http://localhost:3333/health | jq -r '.status')
          echo "Health status: $STATUS"
          [ "$STATUS" = "ok" ] || exit 1

      - name: Verify Swagger docs
        run: curl -sf http://localhost:3333/swagger | head -1

      - name: Cleanup
        if: always()
        run: docker rm -f th0th-api 2>/dev/null || true
